<!DOCTYPE html>
<html lang="vi" class="scroll-auto">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đoàn Thị Ngọc Ánh — Business Analyst Portfolio</title>
  <meta name="description" content="Portfolio cá nhân của Đoàn Thị Ngọc Ánh — Business Analyst chuyên phân tích nghiệp vụ và triển khai hệ thống ERP." />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            navy: {
              900: '#0F172A',
              800: '#1E293B',
              700: '#334155',
            },
          },
          keyframes: {
            fadeInUp: {
              '0%':   { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            'fade-in': 'fadeInUp 0.35s ease-out forwards',
          },
        },
      },
      /* Safelist: đảm bảo các class động được Tailwind CDN tạo ra */
      safelist: [
        'md:col-span-2',
      ],
    };
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* --- Font mặc định toàn trang --- */
    * {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      box-sizing: border-box;
    }

    /* --- Fade-in animation khi chuyển tab --- */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeInUp 0.35s ease-out forwards;
    }

    @keyframes wave {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(12deg); }
      30%  { transform: rotate(-10deg); }
      45%  { transform: rotate(10deg); }
      60%  { transform: rotate(-6deg); }
      75%  { transform: rotate(6deg); }
      100% { transform: rotate(0deg); }
    }
    .wave-emoji {
      display: inline-block;
      transform-origin: 70% 70%;
      animation: wave 2s ease-in-out infinite;
    }

    /* --- Custom scrollbar (Chrome/Edge/Safari) --- */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    body {
      margin: 0;
      background-color: #ffffff;
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <script src="./data.js"></script>

  <script type="text/babel" data-presets="react">
    // Lấy trực tiếp State từ biến React toàn cục đã nạp ở mục ③
    const { useState } = React;

    /* ============================================================
       SKILL ICONS — SVG component cho từng loại kỹ năng
    ============================================================ */
    const IconAnalysis = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-10 h-10 text-blue-400">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
    );

    const IconModeling = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-10 h-10 text-blue-400">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
      </svg>
    );

    const IconDesign = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-10 h-10 text-pink-400">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42" />
      </svg>
    );

    const IconAgile = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-10 h-10 text-emerald-400">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
    );

    const IconSoft = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-10 h-10 text-violet-400">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
      </svg>
    );

    const SKILL_ICON_MAP = {
      analysis: IconAnalysis,
      modeling: IconModeling,
      design:   IconDesign,
      agile:    IconAgile,
      soft:     IconSoft,
    };

    /* ============================================================
       CONTACT ICONS — SVG cho Email, Điện thoại, LinkedIn
    ============================================================ */
    const IconEmail = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-9 h-9">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
      </svg>
    );

    const IconPhone = () => (
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           strokeWidth={1.5} stroke="currentColor" className="w-9 h-9">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
      </svg>
    );

    const IconLinkedIn = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="currentColor" className="w-9 h-9">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
      </svg>
    );

    const CONTACT_ICON_MAP = {
      email:    IconEmail,
      phone:    IconPhone,
      linkedin: IconLinkedIn,
    };

    /* ============================================================
       BƯỚC 3 — Navigation (Menu Mobile Hamburger)
    ============================================================ */
    const Navigation = ({ activeTab, onTabChange, navItems, lang, toggleLanguage }) => {
      const TAB_KEYS = ['home', 'about', 'skills', 'contact'];
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      return (
        <nav className="sticky top-0 z-50 bg-white border-b border-gray-200 h-[80px]">
          <div className="max-w-[1300px] h-full w-full px-4 md:px-6 mx-auto flex items-center justify-between">
            <div className="flex justify-start">
              <span className="text-[20px] md:text-[22px] font-bold text-[#14213D] tracking-tight select-none">
                ANH DOAN
              </span>
            </div>
            <div className="hidden md:flex justify-center gap-x-10">
              {TAB_KEYS.map((key, i) => (
                <a
                  key={key}
                  href={'#' + key}
                  onClick={() => onTabChange(key)}
                  className={
                    'text-[17px] font-semibold relative py-1 no-underline transition-colors duration-200 ' +
                    (activeTab === key ? 'text-[#285ECC]' : 'text-[#14213D] hover:text-[#285ECC]')
                  }
                >
                  {navItems[i]}
                  {activeTab === key && (
                    <span className="absolute -bottom-1 left-0 w-full h-[2px] bg-[#285ECC]" />
                  )}
                </a>
              ))}
            </div>
            <div className="flex justify-end items-center gap-4 md:gap-0">
              <div onClick={toggleLanguage} className="flex items-center gap-x-2 md:gap-x-4 cursor-pointer" title="Switch language">
                <span className="text-[15px] md:text-[17px] font-semibold flex items-center gap-x-1">
                  <span className={lang === 'vi' ? 'text-[#14213D]' : 'text-gray-400'}>VI</span>
                  <span className="text-gray-300">|</span>
                  <span className={lang === 'en' ? 'text-[#14213D]' : 'text-gray-400'}>EN</span>
                </span>
              </div>
              <button className="md:hidden text-[#14213D] text-[28px] leading-none ml-2 focus:outline-none" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                <i className={isMobileMenuOpen ? "bi bi-x" : "bi bi-list"}></i>
              </button>
            </div>
          </div>
          {isMobileMenuOpen && (
            <div className="md:hidden absolute top-[80px] left-0 w-full bg-white border-b border-gray-200 shadow-lg flex flex-col py-2 px-4 z-40">
              {TAB_KEYS.map((key, i) => (
                <a
                  key={key}
                  href={'#' + key}
                  onClick={() => {
                    onTabChange(key);
                    setIsMobileMenuOpen(false);
                  }}
                  className={
                    'text-[16px] font-semibold py-3 px-4 rounded-lg my-1 transition-colors ' +
                    (activeTab === key ? 'bg-blue-50 text-[#285ECC]' : 'text-[#14213D] hover:bg-gray-50')
                  }
                >
                  {navItems[i]}
                </a>
              ))}
            </div>
          )}
        </nav>
      );
    };

    /* ============================================================
       BƯỚC 4 — HomeSection (Tương thích Mobile)
    ============================================================ */
    const HomeSection = ({ data, onContactClick }) => (
      <section id="home" className="relative z-10 min-h-[calc(100vh-80px)] py-10 md:py-20 flex items-center scroll-mt-[80px] shadow-[0_10px_30px_-15px_rgba(0,0,0,0.1)]"
        style={{ backgroundImage: "url('./home_nen.png')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat' }}>
        <div className="max-w-[1300px] w-full px-4 md:px-6 mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10 lg:gap-10 items-center text-center lg:text-left">
          <div className="lg:col-span-7 flex flex-col items-center lg:items-start mt-4 lg:mt-0">
            <div className="inline-flex items-center gap-3 bg-blue-50 border border-blue-100 rounded-full pl-5 pr-1.5 py-1.5 mb-4">
              <span className="text-xs md:text-sm font-semibold text-[#2563eb] tracking-widest uppercase">{data.tagline}</span>
              <span className="flex items-center justify-center w-6 h-6 md:w-8 md:h-8 bg-white rounded-full shadow-sm text-sm md:text-base leading-none">
                <span className="wave-emoji">👋</span>
              </span>
            </div>
            <h1 className="text-[32px] sm:text-[40px] md:text-[56px] lg:text-[72px] font-bold text-[#14213D] leading-[1.1] mb-2">{data.name}</h1>
            <p className="text-[20px] sm:text-[24px] md:text-[32px] lg:text-[42px] font-bold text-[#2563eb] mb-4 md:mb-6">{data.title}</p>
            <p className="max-w-[680px] text-[15px] sm:text-base md:text-[18px] text-[#475569] leading-relaxed mb-8 md:mb-12 text-center lg:text-justify">{data.description}</p>
            <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
              <a href={data.cvLink} target="_blank" rel="noopener noreferrer" download className="flex items-center justify-center gap-2 bg-[#2563eb] hover:bg-blue-700 text-white text-[16px] md:text-[18px] font-medium w-full sm:w-auto px-8 py-3 md:py-2.5 rounded-[0.3rem] transition-all duration-300">
                <i className="bi bi-download"></i> {data.btnCV}
              </a>
              <button onClick={onContactClick} className="flex items-center justify-center gap-2 bg-transparent text-[#2563eb] border border-[#2563eb] hover:bg-blue-50 text-[16px] md:text-[18px] font-medium w-full sm:w-auto px-8 py-3 md:py-2.5 rounded-[0.3rem] transition-all duration-300">
                <i className="bi bi-send"></i> {data.btnContact}
              </button>
            </div>
          </div>
          <div className="lg:col-span-5 flex justify-center lg:justify-end order-first lg:order-last">
            <div className="w-[160px] sm:w-[340px] md:w-[400px] aspect-[4/5] bg-white rounded-3xl border-4 border-white mx-auto lg:mx-0 p-[4px]" style={{ boxShadow: '0 20px 50px rgba(0,0,0,0.12), 0 6px 18px rgba(0,0,0,0.06)' }}>
              <div className="w-full h-full rounded-[20px] overflow-hidden bg-white p-2 md:p-3">
                <img src="./anhthe.png" alt="Đoàn Thị Ngọc Ánh - Business Analyst" className="w-full h-full object-cover rounded-[12px]" />
              </div>
            </div>
          </div>
        </div>
      </section>
    );

    /* ============================================================
       BƯỚC 5 — AboutSection (Tương thích Mobile)
    ============================================================ */
    const AboutSection = ({ data }) => (
      <section id="about" className="min-h-[calc(100vh-80px)] bg-white flex items-center scroll-mt-[80px]">
        <div className="max-w-[1300px] w-full px-4 md:px-6 mx-auto py-12 md:py-20">
          <div className="flex flex-col lg:flex-row justify-between gap-12 lg:gap-8 lg:items-stretch">
            <div className="w-full lg:w-[45%] flex flex-col">
              <div>
                <h2 className="text-[28px] md:text-3xl font-semibold uppercase tracking-wider">
                  <span className="text-gray-900">{data.title1} </span>
                  <span className="text-[#2563EB]">{data.title2}</span>
                </h2>
                <div className="w-12 h-[3px] bg-[#2563EB] mt-2 mb-6 md:mb-8"></div>
                <div className="space-y-4">
                  {data.intro.map((para, i) => (
                    <p key={i} className="text-[15px] md:text-base text-[#475569] leading-relaxed text-justify w-full">{para}</p>
                  ))}
                </div>
              </div>
              <div className="mt-8 md:mt-auto md:pt-6">
                <a href={data.cvLink} target="_blank" rel="noopener noreferrer" download className="flex items-center justify-center md:justify-start gap-2 w-full md:w-fit bg-[#2563EB] hover:bg-blue-700 text-white text-base md:text-sm font-medium px-5 py-3 md:py-2 rounded-[0.3rem] transition-colors duration-200">
                  <i className="bi bi-download"></i> {data.btnCV}
                </a>
              </div>
            </div>
            <div className="w-full lg:w-[45%] h-full">
              <h2 className="text-[28px] md:text-3xl font-semibold text-[#2563EB] uppercase tracking-wider mt-2 lg:mt-0">{data.fieldTitle}</h2>
              <div className="w-12 h-[3px] bg-[#2563EB] mt-2 mb-6"></div>
              <div className="w-full">
                {data.fields.map((field, i) => (
                  <div key={i} className={`w-full h-auto min-h-[52px] flex items-center justify-between border border-gray-100 shadow-sm rounded-lg px-4 py-3 ${i < data.fields.length - 1 ? 'mb-[15px]' : ''}`}>
                    <div className="flex items-center flex-1">
                      <i className="bi bi-check-circle-fill text-[#2563EB] mr-3 text-sm shrink-0"></i>
                      <span className="text-[14px] md:text-base font-semibold uppercase tracking-wide break-words" style={{ color: '#475569' }}>{field}</span>
                    </div>
                    <span className="text-base text-blue-300 font-bold shrink-0 ml-2">{String(i + 1).padStart(2, '0')}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>
    );

    /* ============================================================
       BƯỚC 6 — SkillCard + SkillsSection
    ============================================================ */
    const SkillCard = ({ skill, onDetail, lang }) => {
      const IconComponent = SKILL_ICON_MAP[skill.iconType];
      const ui = window.DETAIL_CONTENT[lang].ui;

      const renderIcon = () => {
        if (!skill.icon) return IconComponent ? <IconComponent /> : null;
        if (skill.icon.endsWith('.png') || skill.icon.endsWith('.svg')) {
          return <img src={skill.icon} className="w-12 h-12 object-contain" alt={skill.title} />;
        }
        return <span className="text-[#2563EB] text-[40px] leading-none" dangerouslySetInnerHTML={{ __html: skill.icon }} />;
      };

      return (
        <div className="bg-white rounded-xl shadow-lg border-l-8 flex items-center" style={{ borderLeftColor: skill.borderColor }}>
          <div className="bg-[#E7EFFD] border-4 border-white shadow-[0_8px_24px_rgba(37,99,235,0.15)] flex items-center justify-center shrink-0 w-24 h-24 rounded-2xl mx-6">
            {renderIcon()}
          </div>
          <div className="border-r border-gray-200 h-[80%] my-auto shrink-0"></div>
          <div className="flex flex-col gap-6 p-6 flex-1">
            <div className="flex flex-col gap-2">
              <h3 className="text-xl font-bold uppercase text-gray-900">{skill.title}</h3>
              {skill.tags && skill.tags.length > 0 && (
                <div className="flex flex-wrap gap-2">
                  {skill.tags.map(tag => (
                    <span key={tag} className="bg-blue-100 text-blue-600 px-3 py-1 rounded-md text-sm font-medium">{tag}</span>
                  ))}
                </div>
              )}
            </div>
            <p className="text-gray-500 leading-relaxed text-justify">{skill.description}</p>
            {skill.hasButton && (
              <button onClick={() => onDetail && onDetail(skill)} className="flex items-center gap-2 bg-blue-600 text-white px-6 py-2 rounded-[0.3rem] w-fit hover:bg-blue-700 font-medium transition-colors duration-200">
                {ui.viewDetail} <i className="bi bi-arrow-right"></i>
              </button>
            )}
          </div>
        </div>
      );
    };

    const SkillsSection = ({ data, onDetail, lang }) => (
      <section id="skills" className="py-20 scroll-mt-[80px]" style={{ backgroundImage: "url('./skill_nen.png')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat' }}>
        <div className="max-w-[1440px] w-full px-4 xl:px-[100px] mx-auto">
          <div className="flex items-center justify-center gap-8 mb-16">
            <div className="flex-1 border-t border-gray-600 max-w-[200px]"></div>
            <h2 className="text-[40px] font-bold text-white uppercase">{data.title}</h2>
            <div className="flex-1 border-t border-gray-600 max-w-[200px]"></div>
          </div>
          <div className="grid grid-cols-1 gap-6">
            {data.items.map(skill => (
              <SkillCard key={skill.id} skill={skill} onDetail={onDetail} lang={lang} />
            ))}
          </div>
        </div>
      </section>
    );

    /* ============================================================
       BƯỚC 6B — ProjectCard + SkillDetail
    ============================================================ */
    const SortDropdown = ({ lang }) => {
      const opts = window.DETAIL_CONTENT[lang].ui.sortOptions;
      const [open, setOpen] = useState(false);
      const [selectedIdx, setSelectedIdx] = useState(0);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };

    const ContactCard = ({ contact }) => (
      <a href={contact.href} target={contact.iconType === 'linkedin' ? '_blank' : undefined} rel="noopener noreferrer" className="bg-white rounded-2xl shadow-sm p-10 flex flex-col items-center hover:shadow-md hover:-translate-y-1 transition-all duration-200 text-center no-underline">

    /* ============================================================
       BƯỚC 8 — App hoàn chỉnh
    ============================================================ */
    const BackToTop = () => {
      const [visible, setVisible] = useState(false);
      React.useEffect(() => {
        const onScroll = () => setVisible(window.scrollY > 300);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      if (!visible) return null;
      return (
        <button onClick={() => window.scrollTo(0, 0)} className="fixed bottom-8 right-8 z-50 w-12 h-12 rounded-full bg-[#2563eb] text-white flex items-center justify-center shadow-lg hover:scale-110 transition-all duration-300" aria-label="Trở lại đầu trang">
          <i className="bi bi-arrow-up text-lg"></i>
        </button>
      );
    };

    const deepFallback = (en, vi) => {
      if (en == null || en === '') return vi;
      if (typeof vi !== 'object' || vi == null) return en;
      if (Array.isArray(vi)) {
        if (!Array.isArray(en) || en.length !== vi.length) return en;
        return en.map((item, i) => deepFallback(item, vi[i]));
      }
      const result = Object.assign({}, vi);
      Object.keys(en).forEach(key => {
        result[key] = deepFallback(en[key], vi[key]);
      });
      return result;
    };

    const App = () => {
      const [activeTab, setActiveTab]             = useState('home');
      const [lang, setLang]                       = useState('vi');
      const [selectedSkillId, setSelectedSkillId] = useState(null);

      const viBase      = window.PORTFOLIO_DATA.vi;
      const currentData = lang === 'vi' ? viBase : deepFallback(window.PORTFOLIO_DATA.en, viBase);
      const selectedSkill = selectedSkillId != null ? (currentData.skills.items.find(s => s.id === selectedSkillId) ?? null) : null;
      const toggleLanguage = () => setLang(l => l === 'vi' ? 'en' : 'vi');

      const scrollToSection = (sectionId) => {
        setActiveTab(sectionId);
        const el = document.getElementById(sectionId);
        if (el) el.scrollIntoView({ behavior: 'auto' });
      };

      const handleDetail = (skill) => {
        setSelectedSkillId(skill.id);
        setActiveTab('skills');
        window.scrollTo({ top: 0, behavior: 'auto' });
      };

      const handleBack = () => {
        setSelectedSkillId(null);
        setTimeout(() => scrollToSection('skills'), 50);
      };

      return (
        <div>
          <BackToTop />
          <Navigation activeTab={activeTab} onTabChange={(key) => { setSelectedSkillId(null); scrollToSection(key); }} navItems={currentData.nav} lang={lang} toggleLanguage={toggleLanguage} />
          <main>
            {selectedSkill ? (
              selectedSkill.iconType === 'design'
                ? <FigmaDetail skill={selectedSkill} onBack={handleBack} navItems={currentData.nav} lang={lang} />
                : <SkillDetail skill={selectedSkill} onBack={handleBack} navItems={currentData.nav} lang={lang} />
            ) : (
              <>
                <HomeSection data={currentData.hero} onContactClick={() => scrollToSection('contact')} />
                <AboutSection data={currentData.about} />
                <SkillsSection data={currentData.skills} onDetail={handleDetail} lang={lang} />
                <ContactSection data={currentData.contact} />
              </>
            )}
          </main>
        </div>
      );
    };

    /* ============================================================
       MOUNT
    ============================================================ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
